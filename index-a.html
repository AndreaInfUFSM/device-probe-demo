<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste rápido</title>
  <style>
    :root {
      --bg: #f8f4ed;
      --panel: #fffdf9;
      --text: #3d342b;
      --muted: #7b6d61;
      --accent: #6f9a8d;
      --accent-dark: #587d72;
      --border: #e1d5c7;
      --shadow: 0 18px 40px rgba(85, 63, 40, 0.12);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(111,154,141,0.10), transparent 28%),
        linear-gradient(180deg, #fbf8f2 0%, #f5eee4 100%);
      color: var(--text);
    }

    .shell {
      width: min(560px, 100%);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 42px 28px;
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.08;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0 auto;
      max-width: 44ch;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }

    .actions {
      margin-top: 28px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 15px 24px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
      box-shadow: 0 10px 24px rgba(111,154,141,0.22);
      transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: var(--accent-dark);
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .loader-wrap {
      margin-top: 28px;
      min-height: 110px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .loader-wrap.visible {
      display: flex;
    }

    .loader {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      position: relative;
      background:
        conic-gradient(from 0deg, rgba(111,154,141,0.16), rgba(111,154,141,1));
      animation: spin 1.1s linear infinite;
      -webkit-mask: radial-gradient(circle 24px, transparent 98%, black 100%);
              mask: radial-gradient(circle 24px, transparent 98%, black 100%);
    }

    .loader::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: #fffdf9;
    }

    .loading-text {
      color: var(--muted);
      font-size: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    dialog {
      width: min(440px, calc(100vw - 24px));
      border: 1px solid var(--border);
      border-radius: 24px;
      background: #fffdf9;
      color: var(--text);
      box-shadow: var(--shadow);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(60, 46, 36, 0.28);
      backdrop-filter: blur(3px);
    }

    .modal-body {
      padding: 28px 24px 24px;
      text-align: center;
    }

    .modal-body h2 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .modal-body p {
      font-size: 16px;
      max-width: 26ch;
    }

    .modal-actions {
      margin-top: 22px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <h1>Ajude com um teste rápido</h1>
      <p>
        Este teste verifica alguns recursos do seu celular. 
      </p>
      <p>
        Os dados serão enviados para a UFSM e usados em pesquisa e desenvolvimento de apoio a empreendimentos da <strong>Incubadora Social</strong>. 
      </p>
      <!-- <p>
        Leva só um instante.
      </p> -->

      <div class="actions">
        <button id="runProbeBtn">Iniciar teste</button>
      </div>

      <div id="loaderWrap" class="loader-wrap" aria-live="polite">
        <div class="loader" aria-hidden="true"></div>
        <div id="statusText" class="loading-text">Preparando teste...</div>
      </div>
    </section>
  </main>

  <dialog id="thanksModal">
    <div class="modal-body">
      <h2>Obrigada!</h2>
      <p>Seu resultado foi enviado com sucesso.</p>
      <div class="modal-actions">
        <button id="closeThanksBtn">Fechar</button>
      </div>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/bowser@2.11.0/es5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"></script>
  <script type="module" src="./app-a.js"></script>
</body>
</html>
